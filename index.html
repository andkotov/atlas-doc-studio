<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Google Docs inspired document workspace." />
    <title>Atlas editorial draft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <div class="docs-icon" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="title-wrap">
            <div class="doc-name" contenteditable="true" spellcheck="false">Untitled document</div>
          </div>
          <div class="doc-tools" aria-hidden="true">
            <span>в†</span>
            <span>в–ў</span>
            <span>вЃ</span>
          </div>
        </div>

        <div class="actions">
          <button class="action-icon" type="button" aria-label="History">в—Њ</button>
          <button class="action-icon" type="button" aria-label="Comments">в–¤</button>
          <button class="action-icon" type="button" aria-label="Video call">в—«</button>
          <button class="share-btn" type="button">
            <span>Share Link</span>
          </button>
          <div class="avatar" aria-hidden="true"></div>
        </div>
      </header>

      <nav class="menu" aria-label="Menu">
        <span contenteditable="true" spellcheck="false">File</span>
        <span contenteditable="true" spellcheck="false">Edit</span>
        <span contenteditable="true" spellcheck="false">View</span>
        <span contenteditable="true" spellcheck="false">Insert</span>
        <span contenteditable="true" spellcheck="false">Format</span>
        <span contenteditable="true" spellcheck="false">Tools</span>
        <span contenteditable="true" spellcheck="false">Extensions</span>
        <span contenteditable="true" spellcheck="false">Help</span>
      </nav>

      <section class="toolbar" aria-label="Formatting toolbar">
        <div class="group">
          <button class="tool" type="button" aria-label="Search">вЊ•</button>
          <button class="tool" type="button" aria-label="Undo">в†¶</button>
          <button class="tool" type="button" aria-label="Redo">в†·</button>
          <button class="tool" type="button" aria-label="Print">вЋ™</button>
          <button class="tool" type="button" aria-label="Spellcheck">Aвњ“</button>
          <button class="tool" type="button" aria-label="Paint format">рџ–Њ</button>
        </div>

        <div class="group">
          <button class="chip" type="button" contenteditable="true" spellcheck="false">100%</button>
          <button class="chip" type="button" contenteditable="true" spellcheck="false">Normal text</button>
          <button class="chip" type="button" contenteditable="true" spellcheck="false">Arial</button>
        </div>

        <div class="group">
          <button class="tool" type="button" aria-label="Decrease font size">в€’</button>
          <button class="chip size" type="button" contenteditable="true" spellcheck="false">11</button>
          <button class="tool" type="button" aria-label="Increase font size">+</button>
        </div>

        <div class="group">
          <button class="toggle active" type="button">B</button>
          <button class="toggle" type="button"><em>I</em></button>
          <button class="toggle" type="button"><u>U</u></button>
          <button class="toggle" type="button">A</button>
          <button class="toggle" type="button">вњЋ</button>
          <button class="toggle" type="button">в›“</button>
          <button class="toggle" type="button">вЉћ</button>
          <button class="toggle" type="button">в–Ј</button>
        </div>

        <div class="group spacer">
          <button class="tool" type="button" aria-label="Align">в°</button>
          <button class="tool" type="button" aria-label="Spacing">в†•</button>
          <button class="tool" type="button" aria-label="Checklist">в‘</button>
          <button class="tool" type="button" aria-label="Bullets">вЂў</button>
          <button class="tool" type="button" aria-label="Numbered list">1.</button>
          <button class="tool" type="button" aria-label="Clear formatting">Г—</button>
        </div>

        <button class="mode" type="button">Editing</button>
      </section>

      <section class="workspace">
        <aside class="sidebar">
          <button class="back" type="button" aria-label="Back">в†ђ</button>

          <div class="sidebar-row">
            <div class="sidebar-title">Document tabs</div>
            <button class="plus" type="button" aria-label="Add tab">+</button>
          </div>

          <button class="tab active" type="button">
            <span class="tab-icon"></span>
            <span contenteditable="true" spellcheck="false">Tab 1</span>
            <span class="tab-menu">в‹®</span>
          </button>

          <div class="sidebar-note">Headings you add to the document will appear here.</div>
        </aside>

        <section class="canvas">
          <div class="ruler top" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span>
          </div>

          <article class="page">
            <div class="cursor" aria-hidden="true"></div>
          </article>

          <div class="ruler bottom" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span>
          </div>
        </section>
      </section>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
